<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search aula en csv</title>
</head>
<body>
    <h1>Buscador de Aula de cursado (curso de nivelación - FAMAF)</h1>
    <label for="number">DNI:</label>
    <input type="number" id="number" name="number">
    <button onclick="searchCSV()">Buscar</button>
    <h2>Resultado:</h2>
    <div id="output"></div>
    <script>
        async function searchCSV() {
            const number = document.getElementById('number').value;
            const response = await fetch('input.csv');
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            const filteredRows = rows.filter(row => row.split(',')[0] === number);
            const output = document.getElementById('output');
            output.innerHTML = '';
            if (filteredRows.length > 0) {
                const row = filteredRows[0].split(',');
                output.innerHTML = `Comisión Guaraní: ${row[1]}<br> Aula Teórico: ${row[2]}<br> Aula Práctico: ${row[3]}`;
            } else {
                output.innerHTML = 'No encontramos tu DNI';
            }
        }
    </script>
</body>
</html>
