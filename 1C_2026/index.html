<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnaMate1/Calculo1 - 2026 </title>
</head>
<body>
    <h1> Análisis 1 / Cálculo 1 - FAMAF</h1>
    <label for="number">DNI/CUIL/PAS/Legajo (sin puntos):</label>
    <input type="text" id="number" name="number">
    <button onclick="searchCSV()">Buscar</button>
        <h2>Resultado:</h2>
    <div id="output"></div>
    <script>
        async function searchCSV() {
            const number = document.getElementById('number').value;
            const response = await fetch('listado.csv');
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            const filteredRows = rows.filter(row => row.split(',')[0] === number);
            const output = document.getElementById('output');
            output.innerHTML = '';
            if (filteredRows.length > 0) {
                const row = filteredRows[0].split(',');
                output.innerHTML = `Estudiante: ${row[1]} ${row[2]}<br>
                Comisión: ${row[3]}<br>
                Puntaje 1er parcial: ${row[4]} puntos   -- NOTA: ${row[5]}<br>                 
                Puntaje 2do parcial: ${row[6]} puntos   -- NOTA: ${row[7]}<br> 
                Puntaje 3er parcial: ${row[8]} puntos   -- NOTA: ${row[9]}<br>
                Puntaje Recuperatorio: ${row[10]} puntos   -- NOTA: ${row[11]}<br>
                <h2>CONDICIÓN FINAL</h2><br>
                <h2>${row[12]}</h2>
                --!
                `;   
            } else {
                output.innerHTML = 'No encontramos tu DNI.';
            }
        }
    </script>
</body>
</html>
